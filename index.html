<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machine Learning Examples</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 3rem 1rem;
            background: var(--bg);
            color: #0f172a;
            line-height: 1.5;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 3rem;
            color: #1e293b;
        }

        .resources-list {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .resource-item {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 1.5rem;
            transition: background 0.2s;
        }

        .resource-item:last-child {
            border-bottom: none;
        }

        .resource-item:hover {
            background: #f1f5f9;
        }

        .resource-name {
            font-weight: 600;
            font-size: 1.1rem;
            color: #334155;
            min-width: 250px;
            flex-shrink: 0;
        }

        .resource-links {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .link-group {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 0.75rem;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .link-html {
            background: #dbeafe;
            color: #1e40af;
            border-color: #bfdbfe;
        }

        .link-html:hover {
            background: #bfdbfe;
        }

        .link-csv {
            background: #dcfce7;
            color: #166534;
            border-color: #bbf7d0;
        }

        .link-csv:hover {
            background: #bbf7d0;
        }

        .link-ipynb {
            background: #fef9c3;
            color: #854d0e;
            border-color: #fef08a;
        }

        .link-ipynb:hover {
            background: #fde68a;
        }
    </style>
</head>

<body>
    <h1>Machine Learning Examples</h1>

    <div class="resources-list">
        
        <div class="resource-item">
            <div class="resource-name">regression_housing</div>
            <div class="resource-links">
                
                <a href="docs/regression_housing.html" class="link-group link-html">Open</a>
                
                
                <a href="docs/regression_housing.csv" download class="link-group link-csv">Download CSV</a>
                
                
                <a href="docs/regression_housing.ipynb" download class="link-group link-ipynb">Download ipynb</a>
                
            </div>
        </div>
        
    </div>

    <footer>
        <a href="https://github.com/imivi/ml-examples">Source on GitHub</a>
    </footer>

</body>

</html>
